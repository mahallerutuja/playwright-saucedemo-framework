name: Smoke Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env.qa file
        run: |
          mkdir -p env
          echo "BASE_URL=${{ secrets.BASE_URL }}" > env/.env.qa
          echo "STANDARD_USERNAME=${{ secrets.STANDARD_USERNAME }}" >> env/.env.qa
          echo "STANDARD_PASSWORD=${{ secrets.STANDARD_PASSWORD }}" >> env/.env.qa
          echo "INVALID_USERNAME=${{ secrets.INVALID_USERNAME }}" >> env/.env.qa
          echo "INVALID_PASSWORD=${{ secrets.INVALID_PASSWORD }}" >> env/.env.qa

      - name: Run Smoke Tests
        run: npx playwright test --grep @smoke --project=chromium

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 30
